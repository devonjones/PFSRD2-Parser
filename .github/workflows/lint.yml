name: CI

on:
  push:
    branches: [main, master, feat/*]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "black==24.10.0" ruff

      - name: Check Black formatting
        run: black --check .

      - name: Run Ruff linter
        run: ruff check .

      - name: Check JSON schema formatting
        run: |
          python3 -c "
          import json, glob, sys
          bad = []
          for f in sorted(glob.glob('pfsrd2/schema/*.json')):
              with open(f) as fp:
                  raw = fp.read()
              data = json.loads(raw)
              expected = json.dumps(data, indent=2, sort_keys=True, ensure_ascii=False) + '\n'
              if raw != expected:
                  bad.append(f)
          if bad:
              print('JSON schemas not formatted (indent=2, sort_keys=True):')
              for f in bad:
                  print(f'  {f}')
              print()
              print('Fix: run pre-commit or reformat with indent=2, sort_keys=True')
              sys.exit(1)
          print('All JSON schemas correctly formatted')
          "

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml jsonschema html2markdown markdownify python-dateutil pytest

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          PYTHONPATH: .
