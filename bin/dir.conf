# Resolve the project root (parent of PFSRD2-Parser) regardless of CWD.
# This file can be sourced from any directory.
_DIR_CONF_DIR="$(cd "$(dirname "${BASH_SOURCE[0]:-$0}")" && pwd)"
_PROJECT_ROOT="$(cd "$_DIR_CONF_DIR/../.." && pwd)"

export PF_DATA_DIR="$_PROJECT_ROOT/pfsrd-data"
export PF_WEB_DIR="$_PROJECT_ROOT/pfsrd-web/aonprd.com"
export PF2_DATA_DIR="$_PROJECT_ROOT/pfsrd2-data"
export PF2_WEB_DIR="$_PROJECT_ROOT/pfsrd2-web/2e.aonprd.com"
export SF_DATA_DIR="$_PROJECT_ROOT/sfsrd-data"
export SF_WEB_DIR="$_PROJECT_ROOT/sfsrd-web/aonsrd.com"

unset _DIR_CONF_DIR _PROJECT_ROOT
